services:
  letta_db:
    image: ankane/pgvector:v0.5.1
    environment:
      - POSTGRES_USER=letta
      - POSTGRES_PASSWORD=letta
      - POSTGRES_DB=letta
    ports:
      - "5432:5432"
    volumes:
      - letta_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "letta"]
      interval: 5s
      timeout: 5s
      retries: 5

  letta_app:
    image: letta/letta:latest
    depends_on:
      letta_db:
        condition: service_healthy
    environment:
      - LETTA_PG_HOST=letta_db
      - LETTA_PG_PORT=5432
      - LETTA_PG_USER=letta
      - LETTA_PG_PASSWORD=letta
      - LETTA_PG_DB=letta
      - LETTA_PG_URI=postgresql://letta:letta@letta_db:5432/letta
      - LETTA_ENVIRONMENT=DEVELOPMENT
      # Add LLM configuration if needed
    ports:
      - "8283:8283"
    command: ["sh", "-c", "alembic upgrade head && python -m letta.main"]

volumes:
  letta_db_data: