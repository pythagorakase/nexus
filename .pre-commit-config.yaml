# Pre-commit hooks for NEXUS.
#
# Bootstrap (once per checkout, after `poetry install`):
#     poetry run pre-commit install
#
# Subsequent commits automatically run the hooks below; bypass with
# `--no-verify` only when you have a specific reason (CI still gates).

repos:
  - repo: local
    hooks:
      - id: regenerate-orrery-catalog
        name: Regenerate Orrery package catalog
        entry: poetry run python -m nexus.agents.orrery.catalog --write
        language: system
        pass_filenames: false
        always_run: true
        description: >
          Always regenerate docs/orrery_packages.md because the catalog's
          dependency surface includes migrations and adjacent Orrery vocabulary
          files, not only templates.py/substrate.py/catalog.py. If the doc
          changes, pre-commit aborts the commit; re-stage the regenerated file
          and commit again.
      - id: validate-config
        name: Validate NEXUS config and model-ID drift
        entry: poetry run python scripts/validate_config_commit.py
        language: system
        pass_filenames: false
        files: (^nexus\.toml$|\.py$)
        description: >
          Makes model-roster edits safe to commit: loads nexus.toml through
          the Pydantic models (dangling @provider.role refs abort here, not
          at the next boot), enforces the dev-dashboard ship-off invariant,
          and runs the model-ID drift scan for stale literals lacking a
          "# pin:" comment.
