<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Theme class applied before React renders to prevent flash of wrong styles -->
    <script>
      (function() {
        var stored = localStorage.getItem('nexus-theme');
        // Handle migration from old 'cyberpunk' to 'vector'
        if (stored === 'cyberpunk') stored = 'vector';
        // Validate stored value. Veil is the default theme (bare .dark);
        // Gilded and Vector are override classes.
        var theme = ['gilded', 'vector', 'veil'].includes(stored) ? stored : 'veil';
        // Apply classes immediately
        document.documentElement.classList.add('dark');
        if (theme === 'gilded') document.documentElement.classList.add('theme-gilded');
        else if (theme === 'vector') document.documentElement.classList.add('theme-vector');
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>NEXUS IRIS - Narrative Intelligence System</title>
    <meta name="description" content="AI-driven interactive storytelling interface with advanced memory architecture and immersive cyberpunk terminal aesthetic" />

    <!-- PWA Icons and Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Apple PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NEXUS" />

    <!-- Theme Colors -->
    <meta name="theme-color" content="#0d9488" />
    <meta name="msapplication-TileColor" content="#0d9488" />

    <!-- All brand fonts are self-hosted keepers served from /fonts/ via
         @font-face in src/index.css — no CDN dependency. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
