# NEXUS Configuration
# This file uses TOML format: https://toml.io/

# =============================================================================
# Global Settings
# =============================================================================

[global.model]
# Display-only model ID for legacy settings consumers.
# Inference callers must use role-resolved agent fields such as @openai.default.
default_model = "gpt-5.5"

# Default model for newly created/reset slots
# Use "TEST" for development (mock responses, no API key needed)
default_slot_model = "TEST"

# Provider-grouped API model definitions
# Each provider section lists models available for that API backend AND named
# roles that downstream consumers reference via "@provider.role" syntax.
# Editing a role here (e.g., openai.default) propagates everywhere automatically.
[global.model.api_models.openai]
roles = { default = "gpt-5.5" }
models = [
    { id = "gpt-5.5", label = "GPT-5.5" },
]

[global.model.api_models.anthropic]
roles = { default = "claude-sonnet-4-6", deep = "claude-opus-4-7", fast = "claude-haiku-4-5" }
models = [
    { id = "claude-sonnet-4-6", label = "Sonnet 4.6" },
    { id = "claude-opus-4-7", label = "Opus 4.7" },
    { id = "claude-haiku-4-5", label = "Haiku 4.5" },
]

[global.model.api_models.test]
roles = { default = "TEST" }
models = [
    { id = "TEST", label = "TEST", description = "Mock server with cached data (dev)" },
]

# =============================================================================
# Secrets (API Keys)
# =============================================================================

# Provider -> 1Password reference mapping. Used ONLY by
# scripts/sync_secrets.py to bootstrap macOS Keychain. Runtime callers go
# through nexus.util.secret_manager.get_secret() which reads from Keychain.
#
# Reference syntax:
#   "op-item:<item-id>:<field-name>"   -> uses `op item get`
#   "op-read:<secret-reference>"       -> uses `op read`
[secrets.providers]
openai = "op-item:tyrupcepa4wluec7sou4e7mkza:api key"
anthropic = "op-read:op://API/Anthropic/api key"
openrouter = "op-read:op://API/OpenRouter/api key"

[global.narrative]
# Test mode settings for development (legacy - prefer model picker with TEST model)
test_mode = false
test_database_suffix = "_test"

# =============================================================================
# UI Settings (read by the React client via GET /api/settings)
# =============================================================================

[ui]
# Typewriter reveal speed for incoming narrative chunks (NEXUS IRIS design
# system specifies 30-50 ms/char).
typewriter_ms_per_char = 35

# =============================================================================
# Wizard Settings (New Story Setup)
# =============================================================================

[wizard]
# Use @provider.role syntax. Resolved at config load via the api_models registry.
default_model = "@openai.default"
fallback_model = "@anthropic.fast"
message_history_limit = 20
max_retries = 2
max_tokens = 4096
enable_streaming = true

# =============================================================================
# LORE Agent Settings
# =============================================================================

[lore]
debug = true
agentic_sql = true  # Enable agent to generate SQL queries dynamically

[lore.retrieval]
max_deep_queries = 5

[lore.token_budget]
# Context window limits for APEX generation
apex_context_window = 75_000  # Total tokens available for APEX (includes prompt + context)
system_prompt_tokens = 5000  # Reserved tokens for system prompt

[lore.payload_percent_budget.structured_summaries]
# Percentage allocation for entity summaries, relationships, events
min = 70  # Minimum % for structured data
max = 90  # Maximum % for structured data

[lore.payload_percent_budget.contextual_augmentation]
# Percentage allocation for context enrichment (themes, callbacks)
min = 5   # Minimum % for augmentation
max = 15  # Maximum % for augmentation

[lore.payload_percent_budget.warm_slice]
# Percentage allocation for recent narrative chunks
min = 5   # Minimum % for warm slice
max = 15  # Maximum % for warm slice

[lore.entity_inclusion]
# Controls which entities/events are included in context payload
warm_slice_lookback_chunks = 20          # How many recent chunks to scan for entities
max_characters_from_warm_slice = 25      # Max characters to extract from warm slice
max_locations_from_warm_slice = 10       # Max locations to extract from warm slice
include_all_relationships = true         # Include all relationships for featured characters
include_all_active_events = true         # Include all active story events
include_all_active_threats = true        # Include all active threats

# Event statuses that count as "active"
active_event_statuses = ["active", "ongoing", "escalating"]
active_threat_statuses = ["active", "imminent"]

# Hard caps on total entities in payload
max_total_characters = 30
max_total_relationships = 100
max_total_events = 15
max_total_threats = 10

# =============================================================================
