# NEXUS Configuration
# This file uses TOML format: https://toml.io/

# =============================================================================
# Global Settings
# =============================================================================

[global.model]
# Display-only model reference for legacy settings consumers, resolved to a
# concrete ID at config load via the api_models registry below.
# Inference callers must use role-resolved agent fields such as @openai.default.
default_model = "@openai.default"

# Default model for newly created/reset slots
# Use "TEST" for development (mock responses, no API key needed)
default_slot_model = "TEST"

# Provider-grouped API model definitions
# Each provider section lists models available for that API backend AND named
# roles that downstream consumers reference via "@provider.role" syntax.
# Editing a role here (e.g., openai.default) propagates everywhere automatically.
# Per-model `unsupported_params` lists request parameters the provider rejects
# outright for that model (e.g. temperature on reasoning-class models).
# Config load refuses any consumer section that configures one of them.
[global.model.api_models.openai]
roles = { default = "gpt-5.5" }
models = [
    { id = "gpt-5.5", label = "GPT-5.5", unsupported_params = ["temperature", "top_p"] },
]

[global.model.api_models.anthropic]
roles = { default = "claude-opus-4-8", deep = "claude-fable-5", fast = "claude-sonnet-4-6" }
models = [
    { id = "claude-sonnet-4-6", label = "Sonnet 4.6" },
    { id = "claude-opus-4-8", label = "Opus 4.8", unsupported_params = ["temperature", "top_p", "top_k"] },
    { id = "claude-fable-5", label = "Fable 5", unsupported_params = ["temperature", "top_p", "top_k"] },
]

# Non-native providers are OpenAI-compatible servers: `base_url` is where the
# OpenAI client points. Any local server (Ollama, vLLM, ...) is registered the
# same way — a new provider section with its own base_url and model list.
# `api_key_secret` names a Keychain account (service "nexus-api") when the
# server needs a key; leave unset for keyless servers like this mock.
[global.model.api_models.test]
ui_visible = false  # Backend/CLI-only mock server; hidden from UI model pickers
base_url = "http://127.0.0.1:5102/v1"
roles = { default = "TEST" }
models = [
    { id = "TEST", label = "TEST", description = "Mock server with cached data (dev)" },
]

# =============================================================================
# Secrets (API Keys)
# =============================================================================

# Provider -> 1Password reference mapping. Used ONLY by
# scripts/sync_secrets.py to bootstrap macOS Keychain. Runtime callers go
# through nexus.util.secret_manager.get_secret() which reads from Keychain.
#
# Reference syntax:
#   "op-item:<item-id>:<field-name>"   -> uses `op item get`
#   "op-read:<secret-reference>"       -> uses `op read`
[secrets.providers]
openai = "op-item:tyrupcepa4wluec7sou4e7mkza:api key"
anthropic = "op-read:op://API/Anthropic/api key"
openrouter = "op-read:op://API/OpenRouter/api key"

[global.narrative]
# Test mode settings for development (legacy - prefer model picker with TEST model)
test_mode = false
test_database_suffix = "_test"

# =============================================================================
# UI Settings (read by the React client via GET /api/settings)
# =============================================================================

[ui]
# Typewriter reveal speed for incoming narrative chunks (NEXUS IRIS design
# system specifies 30-50 ms/char).
typewriter_ms_per_char = 35

# Active NEXUS IRIS theme, persisted across sessions via PATCH /api/settings.
theme = "veil"

[ui.lore_budget_slider]
# Bounds, step, and preset ladder stops for the LORE budget slider in the
# settings pane. Values are token counts for lore.token_budget.apex_context_window.
min = 10_000
max = 200_000
step = 1000
stops = [75_000, 100_000, 150_000, 200_000]

# Per-theme font slot choices (NEXUS IRIS keeper matrix). The display slot is
# the marquee font — reserved for the NEXUS wordmark and locked in the UI.
[ui.fonts.veil]
body = "Spectral"
menu = "Cinzel"
display = "Megrim"

[ui.fonts.gilded]
body = "Cormorant Garamond"
menu = "Space Mono"
display = "Monoton"

[ui.fonts.vector]
body = "Rajdhani"
menu = "Source Code Pro"
display = "Sixtyfour"

# =============================================================================
# Wizard Settings (New Story Setup)
# =============================================================================

[wizard]
# Use @provider.role syntax. Resolved at config load via the api_models registry.
default_model = "@openai.default"
fallback_model = "@anthropic.fast"
message_history_limit = 20
max_retries = 2
max_tokens = 4096
enable_streaming = true

[wizard.trait_inputs]
# Transition-time derivation of typed trait-compiler inputs (M9). The wizard
# chat records trait selections and prose rationales only; when the character
# sheet reaches the wizard -> narrative transition without TraitCompileInputs,
# one structured Skald call derives them so the M5 compilers can write
# mechanical state (relationship rows, pair-tags, stub entities) instead of
# leaving every trait a prose-only remainder. Skipped for the mock TEST model.
derive_at_transition = true
max_tokens = 4096

# =============================================================================
# API Settings
# =============================================================================

[api.database]
# Postgres connect_timeout (seconds) for API connection pools and worker
# connections. Bounds how long an unreachable database can stall a caller;
# import-time code must never connect at all (issue #369).
connect_timeout_seconds = 5

[api.uploads]
# Per-file size cap (MB) for character portrait / place image uploads and
# the maximum number of files accepted in a single upload request.
max_file_size_mb = 15
max_files_per_request = 10

# =============================================================================
# LORE Agent Settings
# =============================================================================

[lore]
debug = true
agentic_sql = true  # Enable agent to generate SQL queries dynamically

[lore.retrieval]
max_deep_queries = 5

[lore.token_budget]
# Context window limits for APEX generation
apex_context_window = 75_000  # Total tokens available for APEX (includes prompt + context)
system_prompt_tokens = 5000  # Reserved tokens for system prompt

[lore.payload_percent_budget.structured_summaries]
# Percentage allocation for entity summaries, relationships, events
min = 70  # Minimum % for structured data
max = 90  # Maximum % for structured data

[lore.payload_percent_budget.contextual_augmentation]
# Percentage allocation for context enrichment (themes, callbacks)
min = 5   # Minimum % for augmentation
max = 15  # Maximum % for augmentation

[lore.payload_percent_budget.warm_slice]
# Percentage allocation for recent narrative chunks
min = 5   # Minimum % for warm slice
max = 15  # Maximum % for warm slice

[lore.entity_inclusion]
# Controls which entities/events are included in context payload
warm_slice_lookback_chunks = 20          # How many recent chunks to scan for entities
max_characters_from_warm_slice = 25      # Max characters to extract from warm slice
max_locations_from_warm_slice = 10       # Max locations to extract from warm slice
include_all_relationships = true         # Include all relationships for featured characters
include_all_active_events = true         # Include all active story events
include_all_active_threats = true        # Include all active threats

# Event statuses that count as "active"
active_event_statuses = ["active", "ongoing", "escalating"]
active_threat_statuses = ["active", "imminent"]

# Hard caps on total entities in payload
max_total_characters = 30
max_total_relationships = 100
max_total_events = 15
max_total_threats = 10

# =============================================================================
# Orrery Settings (Off-Screen Behavior Resolver)
# =============================================================================

[orrery]
enabled = true

[orrery.binding]
window_chunks = 30

[orrery.selection]
# Branch selection inside a fired package: "stochastic" softmax-samples all
# passing branches by magnitude (PRNG seeded on per-resolution persisted
# values -> reproducible; committed state_delta log stays the replay
# authority); "authored_order" is the legacy deterministic rule.
mode = "stochastic"
temperature = 0.25
seed_salt = ""

[orrery.reconstruction]
# JSONB state checkpoint every N accepted chunks (0 disables); genesis and
# manual snapshots via scripts/checkpoint_state.py.
checkpoint_interval_chunks = 25

[orrery.prompt]
# Render caps for Orrery material in the storyteller prompt. The commit-time
# prompt-exposure log records the same first-N slice, so these are also the
# boundary between "ratified by omission" and "never shown".
max_rendered_proposals = 5
max_rendered_pressures = 5

[orrery.habituation]
# Repetition dampening: each committed win inside window_ticks debits the
# template's effective priority for that actor (capped), so a repeat winner
# (surveil at 56% dominance) eventually yields to the packages it shadows.
# Deterministic — counts come from committed orrery_resolutions rows.
# Crisis-band packages never dampen.
enabled = true
window_ticks = 40
penalty_per_win = 3.0
max_penalty = 10.0
exempt_bands = ["crisis_constraint"]

[orrery.fanout]
# Per-actor cap on two-party drafts per tick. Kept drafts prefer template
# diversity, then magnitude; crisis-band drafts are never trimmed.
max_pair_drafts_per_actor = 2
exempt_bands = ["crisis_constraint"]

[orrery.ecology]
# Detection percent for emitted branch signals (signal_event_type) whose
# event type has no explicit rate in [orrery.ecology.signal_detection].
# The roll is a deterministic hash of (template, actor, target, tick,
# event type): same state -> same outcome on replay.
signal_detection_default = 100

[orrery.ecology.signal_detection]
# Most surveillance goes unnoticed by its subject; overt acts are hard to
# miss. Undetected signals are recorded in the primary event's payload for
# the audit layer but feed no gates.
compliance_alert = 35
threat_issued = 80
encoded_message = 95

[orrery.dashboard]
# Registers the read-only /api/dev/orrery/* audit router on the gateway.
# Server-side gate (import.meta.env.DEV only hides the client bundle): the
# gateway has no auth and binds 0.0.0.0, so this ships off — flip to true
# locally while working on the audit dashboard (issue #415).
enabled = false
# Coverage analyzer bounds: max anchors per request (each anchor is a full
# explained dry-run tick) and the backfill-epoch lint threshold (distinct
# world times written within one wall-clock second).
coverage_max_anchors = 50
coverage_epoch_min_world_times = 10

[orrery.route_graph]
max_edges_per_query = 5000

[orrery.narration]
mode = "async"
provider = "anthropic"
model_ref = "@anthropic.default"
# Optional sampling/queue knobs (defaults in OrreryNarrationSettings):
#   temperature        — omitted from the request entirely when unset; setting
#                        it for a model whose registry entry lists it in
#                        unsupported_params is a config-load error (#401)
#   max_output_tokens  — narration output ceiling (default 1200)
#   max_attempts       — narration job attempts before failure (default 3)
#   retry_delay_seconds — backoff between attempts (default 300)

[orrery.bleed]
max_candidates = 3

[orrery.promote]
# Calibrated against the 106-resolution corpus on save_05 (39 ticks, 2026-06).
# Template priorities seam cleanly: mundane needs band tops out at 26
# (routine_commute); relational/dramatic templates start at 35 (consult_rival).
# priority_threshold = 30 promotes every above-mundane template while skipping
# the drink/eat/work/tend_craft/maintain_cover noise floor (4/106 = 3.8% of the
# historical corpus, ~1 promotion per 10 ticks of a quiet stretch).
# Observed routine-outcome magnitudes max at 0.22; catalog branch magnitudes
# for noteworthy outcomes start at ~0.34-0.40. magnitude_threshold = 0.35 lets
# a dramatic outcome of a mundane template (e.g. sleep 0.74, eat 0.62) promote
# via the OR-side without ever firing on routine outcomes. The old default of
# 0.5 was unreachable: no observed resolution exceeded 0.22.
priority_threshold = 30.0
magnitude_threshold = 0.35
perceptual_summary_max_chars = 240

[orrery.sunhelm]
accrual_rates = { sleep = 1.0, hunger = 1.0, thirst = 1.0, socialize = 1.0, intimacy = 1.0 }
priorities = { sleep = 25, thirst = 24, hunger = 22, socialize = 18, intimacy = 16 }

[orrery.sunhelm.severity_thresholds.sleep]
mild = 16.0
moderate = 30.0
severe = 48.0
critical = 72.0

[orrery.sunhelm.severity_thresholds.hunger]
mild = 8.0
moderate = 16.0
severe = 30.0
critical = 48.0

[orrery.sunhelm.severity_thresholds.thirst]
mild = 4.0
moderate = 8.0
severe = 16.0
critical = 24.0

[orrery.sunhelm.severity_thresholds.socialize]
mild = 24.0
moderate = 72.0
severe = 168.0
critical = 336.0

[orrery.sunhelm.severity_thresholds.intimacy]
mild = 72.0
moderate = 168.0
severe = 336.0
critical = 720.0

[orrery.sunhelm.pressure]
min_severity_level = 2
magnitude_base = 0.35
magnitude_per_level = 0.10
magnitude_cap = 0.85

[orrery.retrograde.retrieval]
# Retrieval surface for persisted Retrograde history (spec decision 14 / M3).
# summary_chunks: write one finalized prose summary chunk per persisted
# Retrograde world event so MEMNON chunk search retrieves generated history.
summary_chunks = true
# embed_after_apply: run the standard chunk embedding lifecycle for pending
# Retrograde summary chunks immediately after a successful apply commit.
embed_after_apply = true

[orrery.retrograde.wizard]
# Wizard-time Retrograde cold start (spec decisions 6/8/14, M4). When enabled,
# the wizard ready -> narrative transition runs packet -> seed candidates ->
# expansion -> persistence -> embedding before the slot enters narrative mode.
enabled = true
# Allow persistence to create minimum-viable stubs for expansion refs with no
# canonical row (the dehydrated-entity pattern; implied entities stay stubs).
create_entity_stubs = true
# Decision 8 entity-coverage cap: max new minimum-viable stubs one wizard-time
# expansion may introduce beyond the first-class starting entities.
max_new_entity_stubs = 6
# Seed/expansion structured responses are larger than wizard chat turns, so the
# wizard-time Skald calls get their own output-token ceiling.
max_tokens = 16000
# CLI/UI HTTP timeout for the transition request; frontier calls run inside it.
transition_timeout_seconds = 900
# NOTE: transition progress (GET /api/story/new/retrograde/status) lives in a
# process-local registry. Run the API single-worker, or accept that status
# polls answered by a non-writing worker report stage "idle" mid-transition.

[orrery.retrograde.maturation]
# Runtime stub maturation (spec decisions 9/10/12, M8). When Skald declares a
# new entity via the new_entities structured-output field and the entity
# appears in the committed chunk, the commit path enqueues a durable
# maturation job; the post-commit Orrery worker drains the queue and runs the
# scoped single-entity Retrograde pipeline (seed gen -> expansion ->
# persistence -> summary-chunk embedding).
enabled = true
# Soft per-job wall-clock target in seconds (spec budget: ~5-30s). Exceeding
# it logs a warning and is recorded in the job manifest; it never aborts.
budget_seconds = 30.0
max_jobs_per_drain = 2
max_attempts = 3
retry_delay_seconds = 300
# Tighter over-generation than wizard-time (~2x per the spec's runtime knob
# guidance): generate 4 candidate seeds, select 2.
generate_candidates = 4
select_target = 2
deferred_secret_cap = 1
weird_level = "medium"
# Frontier model for the R4/R6 maturation calls.
model_ref = "@openai.default"
# Maturation responses are larger than ordinary wizard chat turns.
max_tokens = 16000
chunk_excerpt_chars = 1200

[orrery.retrograde.weird]
# Player-facing Retrograde strangeness is low/medium/high. Each genre remaps
# those labels onto the raw calibration float below, so "medium" means
# medium-for-that-genre rather than a universal numeric value.
